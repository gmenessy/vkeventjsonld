name: CI

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:

jobs:
  build-test:
    name: Build & Tests (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: mvn test
        run: mvn -B -ntp test

  a11y:
    name: Accessibility-Gate (axe-core)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: App starten (Jetty, H2-Demodaten)
        run: |
          mvn -B -ntp -q org.eclipse.jetty:jetty-maven-plugin:9.4.57.v20241219:run > jetty.log 2>&1 &
          echo "warte auf http://localhost:8080 …"
          for i in $(seq 1 90); do
            if curl -fsS -o /dev/null http://localhost:8080/api/context; then echo "UP"; exit 0; fi
            sleep 3
          done
          echo "App nicht gestartet:"; tail -50 jetty.log; exit 1
      - name: axe-core-Scan (Liste + Detail)
        run: |
          cd a11y
          npm install
          npx playwright install --with-deps chromium
          node axe-scan.mjs
      - name: Jetty-Log (bei Fehler)
        if: failure()
        run: tail -100 jetty.log || true
